<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة المنتظر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f0f11; color: #e5e7eb; }
        .font-amiri { font-family: 'Amiri', serif; }
        .gold-border { border-color: #D4AF37; }
        .text-gold { color: #D4AF37; }
    </style>
</head>
<body>
    <nav class="bg-black border-b gold-border p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-gold">شبكة المنتظر</h1>
            <div class="flex gap-4 text-sm md:text-base">
                <button onclick="loadSection('sahaba')" class="hover:text-gold">الصحابة</button>
                <button onclick="loadSection('mukhalifeen')" class="hover:text-red-500">المخالفون</button>
            </div>
        </div>
    </nav>

    <div id="hero" class="relative h-48 bg-black flex flex-col items-center justify-center text-center border-b border-white/10">
        <h2 class="font-amiri text-2xl text-gold mb-2">﷽ بسم الله الرحمن الرحيم</h2>
        <h1 id="page-title" class="text-3xl font-bold">الرئيسية</h1>
    </div>

    <main id="app" class="container mx-auto p-6 min-h-screen">
        <div class="text-center p-10">اختر قسماً من الأعلى للبدء</div>
    </main>

    <footer class="p-6 border-t border-white/10 text-center text-xs text-gray-500">
        المحتوى مستمد من موقع King of Links
    </footer>

    <script src="app.js"></script>
</body>
</html>
